{{- if and (eq .Values.demis.enabled true) (eq .Values.demis.futs.split true) }}
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: futs-disease-allow-access-from-internal
  labels:
    component: demis
spec:
  selector:
    matchLabels:
      app: futs-disease
  action: ALLOW
  rules:
    - from:
        - source:
            principals: [
              "cluster.local/ns/{{ .Release.Namespace }}/sa/pdfgen-service*",
              "cluster.local/ns/{{ .Release.Namespace }}/sa/notification-processing-service*",
              "cluster.local/ns/{{ .Release.Namespace }}/sa/notification-routing-service*",
              "cluster.local/ns/{{ .Release.Namespace }}/sa/lifecycle-validation-service*"
            ]
      to:
        - operation:
            methods: [ "GET" ]
            paths: [ "/CodeSystem", "/ValueSet", "/conceptmap/*", "/disease*", "/utils/*" ]
{{ end -}}
